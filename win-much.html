<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3b82f6" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1e293b" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI Chat">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="AI Chat">
    <meta name="msapplication-TileColor" content="#3b82f6">
    <meta name="msapplication-navbutton-color" content="#3b82f6">
    <title>AI Chat</title>
    
    <!-- PWA Manifest (内联) -->
    <link rel="manifest" id="manifestLink">
    
    <!-- App 图标 -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect fill='%233b82f6' width='192' height='192' rx='40'/%3E%3Ctext x='96' y='132' font-size='100' text-anchor='middle' fill='white'%3E☁️%3C/text%3E%3C/svg%3E">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E☁️%3C/text%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        *::-webkit-scrollbar { width: 6px; }
        *::-webkit-scrollbar-track { background: transparent; }
        *::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .dark * { scrollbar-color: #475569 transparent; }
        .dark *::-webkit-scrollbar-thumb { background-color: #475569; }
        
        .message-enter { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-hover:hover .message-actions {
            opacity: 1;
            transform: translateY(0);
        }
        
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .drawer-overlay { transition: opacity 0.3s ease; }
        .drawer-panel { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        pre { position: relative; }
        pre .copy-btn {
            position: absolute; top: 8px; right: 8px;
            opacity: 0; transition: opacity 0.2s;
            background: rgba(0,0,0,0.5); color: white;
            border: none; border-radius: 4px; padding: 4px 8px;
            font-size: 12px; cursor: pointer;
        }
        pre:hover .copy-btn { opacity: 1; }
        
        .bubble-user { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .dark .bubble-user { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); }
        
        .action-btn {
            @apply p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-gray-400 hover:text-gray-600 dark:hover:text-gray-200;
        }
        
        /* PWA 全屏适配 */
        @media (display-mode: standalone) {
            body { padding-top: env(safe-area-inset-top); }
            header { padding-top: max(0.5rem, env(safe-area-inset-top)) !important; }
        }
        
        /* iOS 底部安全区域 */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 h-screen overflow-hidden transition-colors duration-200">

    <!-- 移动端遮罩 -->
    <div id="drawerOverlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden drawer-overlay opacity-0" onclick="toggleSidebar()"></div>

    <!-- 侧边栏 -->
    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-50 w-80 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 transform -translate-x-full lg:translate-x-0 drawer-panel flex flex-col shadow-xl lg:shadow-none">
        <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm">AI</div>
                <span class="font-semibold text-lg tracking-tight">Chat Client</span>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <div class="p-4">
            <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 bg-primary-600 hover:bg-primary-700 text-white py-2.5 px-4 rounded-xl transition-all duration-200 font-medium shadow-lg shadow-primary-500/20 hover:shadow-primary-500/30 active:scale-[0.98]">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                新建对话
            </button>
        </div>

        <div class="flex-1 overflow-y-auto px-3 pb-3" id="conversationList"></div>

        <div class="p-4 border-t border-gray-200 dark:border-gray-700 space-y-2">
            <button onclick="openSettings()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-left">
                <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <span class="text-sm font-medium">设置</span>
            </button>
            <button onclick="toggleTheme()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-left">
                <svg class="w-5 h-5 text-gray-500 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                <svg class="w-5 h-5 text-gray-500 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                <span class="text-sm font-medium">切换主题</span>
            </button>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="flex-1 flex flex-col h-screen relative lg:ml-0">
        <header class="h-14 border-b border-gray-200 dark:border-gray-700 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md flex items-center justify-between px-4 sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 -ml-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <div class="flex flex-col">
                    <h2 id="chatTitle" class="font-semibold text-sm truncate max-w-[200px] sm:max-w-md">新对话</h2>
                    <span id="chatModel" class="text-xs text-gray-500 dark:text-gray-400">GPT-4</span>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <button onclick="editCurrentChat()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors" title="编辑当前对话">
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                </button>
                <button onclick="clearCurrentChat()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors" title="清空对话">
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
            </div>
        </header>

        <div id="messageContainer" class="flex-1 overflow-y-auto px-4 py-6 space-y-6 scroll-smooth">
            <div id="emptyState" class="h-full flex flex-col items-center justify-center text-center px-4">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center mb-4 shadow-lg shadow-blue-500/20">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                </div>
                <h3 class="text-xl font-semibold mb-2">开始新的对话</h3>
                <p class="text-gray-500 dark:text-gray-400 max-w-sm text-sm leading-relaxed">
                    选择模型并发送消息开始对话。所有数据保存在本地浏览器中。
                </p>
            </div>
            <div id="messages" class="hidden max-w-3xl mx-auto w-full space-y-6 pb-20"></div>
        </div>

        <div class="border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 p-4 pb-safe">
            <div class="max-w-3xl mx-auto relative">
                <div class="relative flex items-end gap-2 bg-gray-100 dark:bg-gray-800 rounded-2xl p-2 transition-all focus-within:ring-2 focus-within:ring-primary-500/50">
                    <textarea 
                        id="messageInput" 
                        rows="1"
                        placeholder="输入消息... (Shift+Enter 换行)"
                        class="flex-1 bg-transparent border-0 resize-none max-h-32 py-3 px-3 focus:outline-none text-sm leading-relaxed"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                    <button 
                        id="sendBtn"
                        onclick="sendMessage()" 
                        class="mb-1 p-2.5 bg-primary-600 hover:bg-primary-700 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-xl transition-all duration-200 shadow-lg shadow-primary-500/20 active:scale-95"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                    </button>
                </div>
                <div class="mt-2 flex items-center justify-between text-xs text-gray-400 px-1">
                    <span id="inputStatus">Enter 发送 · Shift+Enter 换行</span>
                    <span id="apiStatus" class="flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-gray-400"></span>
                        未配置 API
                    </span>
                </div>
            </div>
        </div>
    </main>

    <!-- 设置模态框 -->
    <div id="settingsModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity" onclick="closeSettings()"></div>
        <div class="absolute inset-x-4 top-[5%] md:inset-x-auto md:left-1/2 md:-translate-x-1/2 md:w-[600px] md:max-w-full bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-h-[90vh] overflow-hidden flex flex-col">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                <h3 class="text-lg font-semibold">设置</h3>
                <button onclick="closeSettings()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <div class="space-y-3">
                    <label class="block text-sm font-medium">API 提供商</label>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
                        <button onclick="selectProvider('openai')" class="provider-btn px-4 py-3 border-2 rounded-xl text-sm font-medium transition-all text-left hover:border-primary-500" data-provider="openai">
                            <div class="font-semibold">OpenAI</div>
                            <div class="text-xs text-gray-500 mt-0.5">gpt-4, gpt-3.5</div>
                        </button>
                        <button onclick="selectProvider('anthropic')" class="provider-btn px-4 py-3 border-2 rounded-xl text-sm font-medium transition-all text-left hover:border-primary-500" data-provider="anthropic">
                            <div class="font-semibold">Anthropic</div>
                            <div class="text-xs text-gray-500 mt-0.5">claude-3</div>
                        </button>
                        <button onclick="selectProvider('deepseek')" class="provider-btn px-4 py-3 border-2 rounded-xl text-sm font-medium transition-all text-left hover:border-primary-500" data-provider="deepseek">
                            <div class="font-semibold">DeepSeek</div>
                            <div class="text-xs text-gray-500 mt-0.5">deepseek-chat</div>
                        </button>
                        <button onclick="selectProvider('groq')" class="provider-btn px-4 py-3 border-2 rounded-xl text-sm font-medium transition-all text-left hover:border-primary-500" data-provider="groq">
                            <div class="font-semibold">Groq</div>
                            <div class="text-xs text-gray-500 mt-0.5">llama, mixtral</div>
                        </button>
                        <button onclick="selectProvider('openrouter')" class="provider-btn px-4 py-3 border-2 rounded-xl text-sm font-medium transition-all text-left hover:border-primary-500" data-provider="openrouter">
                            <div class="font-semibold">OpenRouter</div>
                            <div class="text-xs text-gray-500 mt-0.5">多模型聚合</div>
                        </button>
                        <button onclick="selectProvider('custom')" class="provider-btn px-4 py-3 border-2 rounded-xl text-sm font-medium transition-all text-left hover:border-primary-500" data-provider="custom">
                            <div class="font-semibold">自定义</div>
                            <div class="text-xs text-gray-500 mt-0.5">OpenAI 兼容</div>
                        </button>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-medium">API 密钥</label>
                    <input type="password" id="apiKey" class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500/50 text-sm" placeholder="sk-...">
                    <p class="text-xs text-gray-500">密钥仅保存在本地浏览器中，不会上传到任何服务器。</p>
                </div>

                <div id="customEndpointGroup" class="space-y-2 hidden">
                    <label class="block text-sm font-medium">自定义接口地址</label>
                    <input type="text" id="customEndpoint" class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500/50 text-sm" placeholder="https://api.example.com/v1">
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-medium">模型</label>
                    <div class="flex gap-2">
                        <select id="modelSelect" class="flex-1 px-4 py-2.5 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500/50 text-sm">
                        </select>
                        <button onclick="toggleCustomModel()" id="customModelBtn" class="px-3 py-2.5 border border-gray-200 dark:border-gray-700 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-sm whitespace-nowrap">
                            自定义
                        </button>
                    </div>
                    <input type="text" id="customModelInput" class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500/50 text-sm hidden" placeholder="输入自定义模型名称，如 deepseek-v4-pro">
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-medium">System Prompt</label>
                    <textarea id="systemPrompt" rows="3" class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500/50 text-sm resize-none" placeholder="你是一个有帮助的助手..."></textarea>
                </div>

                <div class="space-y-3">
                    <div class="flex items-center justify-between">
                        <label class="block text-sm font-medium">Temperature</label>
                        <span id="tempValue" class="text-sm font-mono bg-gray-100 dark:bg-gray-700 px-2 py-0.5 rounded">0.7</span>
                    </div>
                    <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" class="w-full accent-primary-600" oninput="document.getElementById('tempValue').textContent = this.value">
                    <div class="flex justify-between text-xs text-gray-500">
                        <span>精确 (0)</span>
                        <span>平衡 (1)</span>
                        <span>创意 (2)</span>
                    </div>
                </div>
            </div>

            <div class="p-6 border-t border-gray-200 dark:border-gray-700 flex justify-end gap-3">
                <button onclick="closeSettings()" class="px-5 py-2.5 border border-gray-200 dark:border-gray-700 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-sm font-medium">取消</button>
                <button onclick="saveSettings()" class="px-5 py-2.5 bg-primary-600 hover:bg-primary-700 text-white rounded-xl transition-colors text-sm font-medium shadow-lg shadow-primary-500/20">保存设置</button>
            </div>
        </div>
    </div>

    <!-- 编辑对话模态框 -->
    <div id="editChatModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeEditChat()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6">
            <h3 class="text-lg font-semibold mb-4">编辑对话</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">对话标题</label>
                    <input type="text" id="editChatTitle" class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500/50 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">System Prompt</label>
                    <textarea id="editChatSystem" rows="2" class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500/50 text-sm resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Temperature: <span id="editTempValue">0.7</span></label>
                    <input type="range" id="editChatTemp" min="0" max="2" step="0.1" value="0.7" class="w-full accent-primary-600" oninput="document.getElementById('editTempValue').textContent = this.value">
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button onclick="closeEditChat()" class="px-4 py-2 border border-gray-200 dark:border-gray-700 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-sm">取消</button>
                <button onclick="saveChatEdit()" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-lg transition-colors text-sm">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== PWA 支持 ====================
        (function() {
            // 生成 Manifest
            const manifest = {
                name: "AI Chat Client",
                short_name: "AI Chat",
                description: "支持多平台的 AI 对话客户端",

                        sizes: "512x512",

                    }

            const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
            const manifestURL = URL.createObjectURL(manifestBlob);
            document.getElementById('manifestLink').href = manifestURL;
            
            // 注册 Service Worker
            const swCode = `
                self.addEventListener('install', e => {
                    e.waitUntil(self.skipWaiting());
                });
                self.addEventListener('activate', e => {
                    e.waitUntil(self.clients.claim());
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(fetch(e.request).catch(() => new Response('离线模式 - 请检查网络连接')));
                });
            `;
            
            if ('serviceWorker' in navigator) {
                const swBlob = new Blob([swCode], {type: 'text/javascript'});
                const swURL = URL.createObjectURL(swBlob);
                navigator.serviceWorker.register(swURL).catch(() => {});
            }
        })();

        // ==================== 配置 ====================
        const PROVIDERS = {
            openai: {
                name: 'OpenAI',
                baseURL: 'https://api.openai.com/v1',
                models: ['gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo', 'gpt-3.5-turbo', 'gpt-4', 'gpt-4-turbo-preview'],
                defaultModel: 'gpt-4o',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' })
            },
            anthropic: {
                name: 'Anthropic',
                baseURL: 'https://api.anthropic.com/v1',
                models: ['claude-3-5-sonnet-20241022', 'claude-3-opus-20240229', 'claude-3-sonnet-20240229', 'claude-3-haiku-20240307'],
                defaultModel: 'claude-3-5-sonnet-20241022',
                headers: (key) => ({ 'x-api-key': key, 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01' })
            },
            deepseek: {
                name: 'DeepSeek',
                baseURL: 'https://api.deepseek.com/v1',
                models: ['deepseek-chat', 'deepseek-coder', 'deepseek-reasoner'],
                defaultModel: 'deepseek-chat',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' })
            },
            groq: {
                name: 'Groq',
                baseURL: 'https://api.groq.com/openai/v1',
                models: ['llama-3.1-70b-versatile', 'llama-3.1-8b-instant', 'mixtral-8x7b-32768', 'gemma-7b-it', 'llama3-70b-8192'],
                defaultModel: 'llama-3.1-70b-versatile',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' })
            },
            openrouter: {
                name: 'OpenRouter',
                baseURL: 'https://openrouter.ai/api/v1',
                models: ['openai/gpt-4o', 'anthropic/claude-3.5-sonnet', 'google/gemini-pro', 'meta-llama/llama-3.1-70b-instruct', 'deepseek/deepseek-chat'],
                defaultModel: 'openai/gpt-4o',

            },
            custom: {
                name: '自定义',
                baseURL: '',
                models: [],
                defaultModel: '',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' })
            }
        };

        // ==================== 状态管理 ====================
        let conversations = JSON.parse(localStorage.getItem('conversations') || '[]');
        let currentId = localStorage.getItem('currentId') || null;
        let settings = JSON.parse(localStorage.getItem('settings') || JSON.stringify({
            provider: 'openai',
            apiKey: '',
            customEndpoint: '',
            model: 'gpt-4o',
            systemPrompt: '你是一个有帮助的助手。',
            temperature: 0.7
        }));
        let isGenerating = false;
        let abortController = null;
        let isCustomModel = false;

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            if (conversations.length === 0) {
                createNewChat(false);
            } else if (!currentId || !conversations.find(c => c.id === currentId)) {
                currentId = conversations[0].id;
            }
            renderConversationList();
            loadCurrentChat();
            updateApiStatus();
            
            if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        });

        // ==================== 主题 ====================
        function initTheme() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }

        // ==================== 侧边栏 ====================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('drawerOverlay');
            const isOpen = !sidebar.classList.contains('-translate-x-full');
            
            if (isOpen) {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
                overlay.classList.remove('opacity-100');
                overlay.classList.add('opacity-0');
            } else {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => {
                    overlay.classList.remove('opacity-0');
                    overlay.classList.add('opacity-100');
                }, 10);
            }
        }

        // ==================== 会话管理 ====================
        function createNewChat(switchTo = true) {
            const newChat = {
                id: Date.now().toString(),
                title: '新对话',
                messages: [],
                systemPrompt: settings.systemPrompt,
                temperature: settings.temperature,
                provider: settings.provider,
                model: settings.model,
                createdAt: Date.now()
            };
            conversations.unshift(newChat);
            saveConversations();
            renderConversationList();
            if (switchTo) {
                currentId = newChat.id;
                saveCurrentId();
                loadCurrentChat();
                toggleSidebar();
            }
            return newChat;
        }

        function switchConversation(id) {
            if (currentId === id) return;
            currentId = id;
            saveCurrentId();
            loadCurrentChat();
            if (window.innerWidth < 1024) toggleSidebar();
        }

        function deleteConversation(id, event) {
            event.stopPropagation();
            if (!confirm('确定要删除这个对话吗？')) return;
            conversations = conversations.filter(c => c.id !== id);
            saveConversations();
            if (currentId === id) {
                currentId = conversations.length > 0 ? conversations[0].id : null;
                if (!currentId) createNewChat();
                else loadCurrentChat();
            }
            renderConversationList();
        }

        function clearCurrentChat() {
            if (!currentId) return;
            const chat = conversations.find(c => c.id === currentId);
            if (!chat || chat.messages.length === 0) return;
            if (!confirm('确定要清空当前对话的所有消息吗？')) return;
            chat.messages = [];
            saveConversations();
            loadCurrentChat();
        }

        function editCurrentChat() {
            const chat = conversations.find(c => c.id === currentId);
            if (!chat) return;
            document.getElementById('editChatTitle').value = chat.title;
            document.getElementById('editChatSystem').value = chat.systemPrompt || '';
            document.getElementById('editChatTemp').value = chat.temperature || 0.7;
            document.getElementById('editTempValue').textContent = chat.temperature || 0.7;
            document.getElementById('editChatModal').classList.remove('hidden');
        }

        function saveChatEdit() {
            const chat = conversations.find(c => c.id === currentId);
            if (!chat) return;
            chat.title = document.getElementById('editChatTitle').value || '新对话';
            chat.systemPrompt = document.getElementById('editChatSystem').value;
            chat.temperature = parseFloat(document.getElementById('editChatTemp').value);
            saveConversations();
            renderConversationList();
            loadCurrentChat();
            closeEditChat();
        }

        function closeEditChat() {
            document.getElementById('editChatModal').classList.add('hidden');
        }

        function renderConversationList() {
            const list = document.getElementById('conversationList');
            list.innerHTML = conversations.map(chat => `
                <div onclick="switchConversation('${chat.id}')" 
                     class="group flex items-center gap-3 px-3 py-3 rounded-xl cursor-pointer transition-all duration-200 mb-1 ${currentId === chat.id ? 'bg-primary-50 dark:bg-primary-900/20 border border-primary-200 dark:border-primary-800' : 'hover:bg-gray-100 dark:hover:bg-gray-700/50 border border-transparent'}">
                    <div class="w-8 h-8 rounded-lg ${currentId === chat.id ? 'bg-primary-100 dark:bg-primary-800 text-primary-600 dark:text-primary-300' : 'bg-gray-100 dark:bg-gray-700 text-gray-500'} flex items-center justify-center flex-shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-medium truncate ${currentId === chat.id ? 'text-primary-700 dark:text-primary-300' : ''}">${escapeHtml(chat.title)}</div>
                        <div class="text-xs text-gray-400 mt-0.5">${PROVIDERS[chat.provider]?.name || '自定义'} · ${chat.model}</div>
                    </div>
                    <button onclick="deleteConversation('${chat.id}', event)" class="opacity-0 group-hover:opacity-100 p-1.5 hover:bg-red-100 dark:hover:bg-red-900/30 text-gray-400 hover:text-red-500 rounded-lg transition-all">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>
                </div>
            `).join('');
        }

        function loadCurrentChat() {
            const chat = conversations.find(c => c.id === currentId);
            if (!chat) return;
            
            document.getElementById('chatTitle').textContent = chat.title;
            document.getElementById('chatModel').textContent = `${PROVIDERS[chat.provider]?.name || '自定义'} · ${chat.model}`;
            
            const messagesDiv = document.getElementById('messages');
            const emptyState = document.getElementById('emptyState');
            
            if (chat.messages.length === 0) {
                messagesDiv.classList.add('hidden');
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                messagesDiv.classList.remove('hidden');
                messagesDiv.innerHTML = chat.messages.map((msg, idx) => renderMessage(msg, idx)).join('');
                addCopyButtons();
                scrollToBottom();
            }
        }

        function renderMessage(msg, idx) {
            const isUser = msg.role === 'user';
            const isError = msg.isError || false;
            return `
                <div class="message-enter message-hover flex gap-4 ${isUser ? 'flex-row-reverse' : ''} group relative" data-idx="${idx}">
                    <div class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center ${isUser ? 'bubble-user text-white' : isError ? 'bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400' : 'bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}">
                        ${isUser 
                            ? '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>'
                            : isError 
                                ? '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
                                : '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>'
                        }
                    </div>
                    <div class="flex-1 max-w-[85%] ${isUser ? 'items-end' : 'items-start'} flex flex-col">
                        <div class="${isUser 
                            ? 'bubble-user text-white rounded-2xl rounded-tr-sm' 
                            : isError
                                ? 'bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-800 dark:text-red-200 rounded-2xl rounded-tl-sm'
                                : 'bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl rounded-tl-sm'} px-4 py-3 shadow-sm relative">
                            ${isUser 
                                ? `<div class="text-sm leading-relaxed whitespace-pre-wrap">${escapeHtml(msg.content)}</div>`
                                : `<div class="prose dark:prose-invert prose-sm max-w-none text-sm leading-relaxed">${marked.parse(msg.content || '')}</div>`
                            }
                        </div>
                        
                        <div class="message-actions flex items-center gap-1 mt-1 px-1 opacity-0 transform translate-y-1 transition-all duration-200 ${isUser ? 'flex-row-reverse' : ''}">
                            ${!isUser && !isError ? `
                                <button onclick="regenerateMessage(${idx})" class="action-btn" title="重新生成">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                                </button>
                            ` : ''}
                            ${isUser ? `
                                <button onclick="editUserMessage(${idx})" class="action-btn" title="编辑">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                                </button>
                            ` : ''}
                            <button onclick="deleteMessage(${idx})" class="action-btn" title="删除">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>
                        </div>
                        <div class="text-xs text-gray-400 mt-0.5 px-1">${formatTime(msg.timestamp)}</div>
                    </div>
                </div>
            `;
        }

        // ==================== 消息操作 ====================
        async function regenerateMessage(idx) {
            if (isGenerating) return;
            const chat = conversations.find(c => c.id === currentId);
            if (!chat) return;
            
            let userIdx = idx - 1;
            while (userIdx >= 0 && chat.messages[userIdx].role !== 'user') {
                userIdx--;
            }
            if (userIdx < 0) return;
            
            chat.messages = chat.messages.slice(0, idx);
            saveConversations();
            loadCurrentChat();
            
            await sendMessageFromHistory(chat.messages[userIdx].content);
        }

        async function editUserMessage(idx) {
            if (isGenerating) return;
            const chat = conversations.find(c => c.id === currentId);
            if (!chat) return;
            
            const newContent = prompt('编辑消息:', chat.messages[idx].content);
            if (newContent === null || newContent.trim() === '') return;
            
            chat.messages[idx].content = newContent;
            chat.messages = chat.messages.slice(0, idx + 1);
            saveConversations();
            loadCurrentChat();
            
            await sendMessageFromHistory(newContent);
        }

        function deleteMessage(idx) {
            if (isGenerating) return;
            if (!confirm('确定要删除这条消息吗？')) return;
            
            const chat = conversations.find(c => c.id === currentId);
            if (!chat) return;
            
            chat.messages.splice(idx, 1);
            saveConversations();
            loadCurrentChat();
        }

        async function sendMessageFromHistory(content) {
            const chat = conversations.find(c => c.id === currentId);
            if (!chat) return;
            
            const provider = PROVIDERS[chat.provider];
            const apiKey = settings.apiKey;
            if (!apiKey && chat.provider !== 'custom') {
                alert('请先配置 API 密钥');
                openSettings();
                return;
            }
            if (chat.provider === 'custom' && !settings.customEndpoint) {
                alert('请先配置自定义接口地址');
                openSettings();
                return;
            }
            
            isGenerating = true;
            updateInputStatus();
            
            const aiMsg = { role: 'assistant', content: '', timestamp: Date.now() };
            chat.messages.push(aiMsg);
            const aiIdx = chat.messages.length - 1;
            
            const messagesDiv = document.getElementById('messages');
            const loadingId = 'loading-' + Date.now();
            messagesDiv.insertAdjacentHTML('beforeend', `
                <div id="${loadingId}" class="message-enter flex gap-4" data-idx="${aiIdx}">
                    <div class="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center flex-shrink-0">
                        <svg class="w-4 h-4 text-gray-500 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    </div>
                    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm">
                        <div class="flex gap-1">
                            <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                            <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                            <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                        </div>
                    </div>
                </div>
            `);
            scrollToBottom();
            
            try {
                await streamChat(chat, aiMsg, loadingId);
            } catch (error) {
                console.error(error);
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) {
                    loadingEl.outerHTML = renderMessage({ role: 'assistant', content: `错误: ${error.message}`, timestamp: Date.now(), isError: true }, aiIdx);
                }
                chat.messages[aiIdx].content = `错误: ${error.message}`;
                chat.messages[aiIdx].isError = true;
            } finally {
                isGenerating = false;
                updateInputStatus();
                saveConversations();
                renderConversationList();
            }
        }

        // ==================== 消息发送 ====================
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content || isGenerating) return;
            
            const chat = conversations.find(c => c.id === currentId);
            if (!chat) return;
            
            const provider = PROVIDERS[chat.provider];
            const apiKey = settings.apiKey;
            if (!apiKey && chat.provider !== 'custom') {
                alert('请先配置 API 密钥');
                openSettings();
                return;
            }
            if (chat.provider === 'custom' && !settings.customEndpoint) {
                alert('请先配置自定义接口地址');
                openSettings();
                return;
            }
            
            const userMsg = { role: 'user', content, timestamp: Date.now() };
            chat.messages.push(userMsg);
            
            input.value = '';
            input.style.height = 'auto';
            const emptyState = document.getElementById('emptyState');
            const messagesDiv = document.getElementById('messages');
            emptyState.classList.add('hidden');
            messagesDiv.classList.remove('hidden');
            messagesDiv.insertAdjacentHTML('beforeend', renderMessage(userMsg, chat.messages.length - 1));
            scrollToBottom();
            
            if (chat.title === '新对话') {
                chat.title = content.slice(0, 20) + (content.length > 20 ? '...' : '');
                document.getElementById('chatTitle').textContent = chat.title;
                renderConversationList();
            }
            
            isGenerating = true;
            updateInputStatus();
            const aiMsg = { role: 'assistant', content: '', timestamp: Date.now() };
            chat.messages.push(aiMsg);
            const aiIdx = chat.messages.length - 1;
            
            const loadingId = 'loading-' + Date.now();
            messagesDiv.insertAdjacentHTML('beforeend', `
                <div id="${loadingId}" class="message-enter flex gap-4" data-idx="${aiIdx}">
                    <div class="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center flex-shrink-0">
                        <svg class="w-4 h-4 text-gray-500 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    </div>
                    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm">
                        <div class="flex gap-1">
                            <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                            <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                            <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                        </div>
                    </div>
                </div>
            `);
            scrollToBottom();
            
            try {
                await streamChat(chat, aiMsg, loadingId);
            } catch (error) {
                console.error(error);
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) {
                    loadingEl.outerHTML = renderMessage({ role: 'assistant', content: `错误: ${error.message}`, timestamp: Date.now(), isError: true }, aiIdx);
                }
                chat.messages[aiIdx].content = `错误: ${error.message}`;
                chat.messages[aiIdx].isError = true;
            } finally {
                isGenerating = false;
                updateInputStatus();
                saveConversations();
                renderConversationList();
            }
        }

        async function streamChat(chat, aiMsg, loadingId) {
            const provider = PROVIDERS[chat.provider];
            const baseURL = chat.provider === 'custom' ? settings.customEndpoint : provider.baseURL;
            const headers = provider.headers(settings.apiKey);
            
            let body;
            const messages = [];
            if (chat.systemPrompt) {
                messages.push({ role: 'system', content: chat.systemPrompt });
            }
            messages.push(...chat.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content })));
            
            if (chat.provider === 'anthropic') {
                body = {
                    model: chat.model,
                    messages: messages.filter(m => m.role !== 'system'),
                    system: chat.systemPrompt,
                    max_tokens: 4096,
                    temperature: chat.temperature,
                    stream: true
                };
            } else {
                body = {
                    model: chat.model,
                    messages,
                    temperature: chat.temperature,
                    stream: true
                };
            }
            
            abortController = new AbortController();
            
            const response = await fetch(`${baseURL}/chat/completions`, {
                method: 'POST',
                headers,
                body: JSON.stringify(body),
                signal: abortController.signal
            });
            
            if (!response.ok) {
                const error = await response.json().catch(() => ({}));
                throw new Error(error.error?.message || `HTTP ${response.status}`);
            }
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let fullContent = '';
            
            const loadingEl = document.getElementById(loadingId);
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = renderMessage({ role: 'assistant', content: '', timestamp: Date.now() }, chat.messages.length - 1);
            const newMsgEl = tempDiv.firstElementChild;
            loadingEl.replaceWith(newMsgEl);
            
            const contentDiv = newMsgEl.querySelector('.prose');
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                
                for (const line of lines) {
                    if (line.trim() === '') continue;
                    if (line.trim() === 'data: [DONE]') continue;
                    
                    try {
                        const json = JSON.parse(line.replace(/^data: /, ''));
                        let delta = '';
                        
                        if (chat.provider === 'anthropic') {
                            if (json.type === 'content_block_delta') {
                                delta = json.delta?.text || '';
                            }
                        } else {
                            delta = json.choices?.[0]?.delta?.content || '';
                        }
                        
                        if (delta) {
                            fullContent += delta;
                            aiMsg.content = fullContent;
                            contentDiv.innerHTML = marked.parse(fullContent);
                            if (window.hljs) {
                                contentDiv.querySelectorAll('pre code').forEach((block) => {
                                    hljs.highlightElement(block);
                                });
                            }
                            scrollToBottom();
                        }
                    } catch (e) {}
                }
            }
            
            addCopyButtons();
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 128) + 'px';
        }

        function scrollToBottom() {
            const container = document.getElementById('messageContainer');
            container.scrollTop = container.scrollHeight;
        }

        function updateInputStatus() {
            const btn = document.getElementById('sendBtn');
            const status = document.getElementById('inputStatus');
            if (isGenerating) {
                btn.disabled = true;
                btn.innerHTML = '<svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
                status.textContent = '生成中...';
            } else {
                btn.disabled = false;
                btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>';
                status.textContent = 'Enter 发送 · Shift+Enter 换行';
            }
        }

        // ==================== 设置 ====================
        function openSettings() {
            document.getElementById('settingsModal').classList.remove('hidden');
            selectProvider(settings.provider);
            document.getElementById('apiKey').value = settings.apiKey;
            document.getElementById('customEndpoint').value = settings.customEndpoint;
            document.getElementById('systemPrompt').value = settings.systemPrompt;
            document.getElementById('temperature').value = settings.temperature;
            document.getElementById('tempValue').textContent = settings.temperature;
            
            isCustomModel = false;
            const provider = PROVIDERS[settings.provider];
            if (settings.provider === 'custom') {
                document.getElementById('modelSelect').classList.add('hidden');
                document.getElementById('customModelBtn').classList.add('hidden');
                document.getElementById('customModelInput').classList.remove('hidden');
                document.getElementById('customModelInput').value = settings.model;
            } else {
                document.getElementById('customModelBtn').classList.remove('hidden');
                if (provider.models.includes(settings.model)) {
                    document.getElementById('modelSelect').classList.remove('hidden');
                    document.getElementById('customModelInput').classList.add('hidden');
                    updateModelSelect(settings.provider, settings.model);
                } else {
                    isCustomModel = true;
                    document.getElementById('modelSelect').classList.add('hidden');
                    document.getElementById('customModelInput').classList.remove('hidden');
                    document.getElementById('customModelInput').value = settings.model;
                    document.getElementById('customModelBtn').textContent = '选择列表';
                }
            }
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
        }

        function toggleCustomModel() {
            isCustomModel = !isCustomModel;
            const select = document.getElementById('modelSelect');
            const input = document.getElementById('customModelInput');
            const btn = document.getElementById('customModelBtn');
            
            if (isCustomModel) {
                select.classList.add('hidden');
                input.classList.remove('hidden');
                btn.textContent = '选择列表';
                input.focus();
            } else {
                select.classList.remove('hidden');
                input.classList.add('hidden');
                btn.textContent = '自定义';
                const provider = document.querySelector('.provider-btn.border-primary-500')?.dataset.provider || 'openai';
                updateModelSelect(provider);
            }
        }

        function selectProvider(provider) {
            document.querySelectorAll('.provider-btn').forEach(btn => {
                if (btn.dataset.provider === provider) {
                    btn.classList.add('border-primary-500', 'bg-primary-50', 'dark:bg-primary-900/20', 'text-primary-700', 'dark:text-primary-300');
                    btn.classList.remove('border-gray-200', 'dark:border-gray-700');
                } else {
                    btn.classList.remove('border-primary-500', 'bg-primary-50', 'dark:bg-primary-900/20', 'text-primary-700', 'dark:text-primary-300');
                    btn.classList.add('border-gray-200', 'dark:border-gray-700');
                }
            });
            
            const customGroup = document.getElementById('customEndpointGroup');
            const modelSelect = document.getElementById('modelSelect');
            const customModelInput = document.getElementById('customModelInput');
            const customModelBtn = document.getElementById('customModelBtn');
            
            isCustomModel = false;
            customModelBtn.textContent = '自定义';
            
            if (provider === 'custom') {
                customGroup.classList.remove('hidden');
                modelSelect.classList.add('hidden');
                customModelInput.classList.remove('hidden');
                customModelBtn.classList.add('hidden');
            } else {
                customGroup.classList.add('hidden');
                modelSelect.classList.remove('hidden');
                customModelInput.classList.add('hidden');
                customModelBtn.classList.remove('hidden');
                updateModelSelect(provider);
            }
        }

        function updateModelSelect(provider, selectedModel) {
            const select = document.getElementById('modelSelect');
            const models = PROVIDERS[provider]?.models || [];
            select.innerHTML = models.map(m => `<option value="${m}" ${m === selectedModel ? 'selected' : ''}>${m}</option>`).join('');
        }

        function saveSettings() {
            const provider = document.querySelector('.provider-btn.border-primary-500')?.dataset.provider || 'openai';
            const apiKey = document.getElementById('apiKey').value.trim();
            const customEndpoint = document.getElementById('customEndpoint').value.trim();
            const systemPrompt = document.getElementById('systemPrompt').value;
            const temperature = parseFloat(document.getElementById('temperature').value);
            
            let model;
            if (provider === 'custom') {
                model = document.getElementById('customModelInput').value.trim();
            } else if (isCustomModel) {
                model = document.getElementById('customModelInput').value.trim();
            } else {
                model = document.getElementById('modelSelect').value;
            }
            
            if (!model) {
                alert('请输入模型名称');
                return;
            }
            
            settings = { provider, apiKey, customEndpoint, model, systemPrompt, temperature };
            localStorage.setItem('settings', JSON.stringify(settings));
            
            const chat = conversations.find(c => c.id === currentId);
            if (chat) {
                chat.provider = provider;
                chat.model = model;
                chat.systemPrompt = systemPrompt;
                chat.temperature = temperature;
                saveConversations();
                loadCurrentChat();
            }
            
            updateApiStatus();
            closeSettings();
        }

        function updateApiStatus() {
            const status = document.getElementById('apiStatus');
            if (settings.apiKey || (settings.provider === 'custom' && settings.customEndpoint)) {
                status.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-green-500"></span><span class="text-green-600 dark:text-green-400">${PROVIDERS[settings.provider]?.name || '自定义'} · ${settings.model}</span>`;
            } else {
                status.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-gray-400"></span>未配置 API`;
            }
        }

        // ==================== 工具函数 ====================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function saveConversations() {
            localStorage.setItem('conversations', JSON.stringify(conversations));
        }

        function saveCurrentId() {
            localStorage.setItem('currentId', currentId);
        }

        function addCopyButtons() {
            document.querySelectorAll('pre').forEach(pre => {
                if (pre.querySelector('.copy-btn')) return;
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = '复制';
                btn.onclick = () => {
                    const code = pre.querySelector('code')?.textContent || pre.textContent;
                    navigator.clipboard.writeText(code);
                    btn.textContent = '已复制!';
                    setTimeout(() => btn.textContent = '复制', 2000);
                };
                pre.appendChild(btn);
            });
        }

        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true
        });
    </script>
</body>
